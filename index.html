<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ALSL Dictionary — Algerian Sign Language</title>

<script>
(function(){
  try{
    var t=localStorage.getItem('alsl_theme');
    if(t==='light'||t==='dark') document.documentElement.setAttribute('data-theme',t);
    var l=localStorage.getItem('alsl_lang')||'ar';
    document.documentElement.setAttribute('lang',l);
    document.documentElement.setAttribute('dir', l==='ar'?'rtl':'ltr');
  }catch(e){}
})();
  </script>
<meta name="theme-color" content="#0e9b98"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">إ</div>
      <div>
        <h1 data-i18n="app_title">Algerian Sign Language Dictionary</h1>
        <p data-i18n="app_subtitle">A validated, avatar-ready lexicon</p>
      </div>
    </div>
    <div class="topctl">
      <div class="tag" id="topcount">…</div>
      <select class="langsel" id="langsel" aria-label="Language"></select>
      <button class="iconbtn" id="themebtn" aria-label="Theme" data-i18n-title="theme_dark"></button>
    </div>
  </div>

  <div class="grid">

    <div class="stage">
      <div class="card">
        <div class="screen"><iframe id="avatar" src="avatar/index.html" title="signer"></iframe></div>
        <div class="nowrap">
          <div class="nowplaying">
            <div>
              <div class="w ar" id="np-word">—</div>
              <div class="fr" id="np-fr"></div>
            </div>
            <div class="srcbadge" id="np-src"></div>
          </div>
          <div class="controls">
            <button class="ctrl" id="c-replay" data-i18n-title="ctrl_replay">
              <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg><span data-i18n="ctrl_replay">Replay</span></button>
            <button class="ctrl" id="c-slow" data-i18n-title="ctrl_slow">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/></svg><span data-i18n="ctrl_slow">Slow</span></button>
            <button class="ctrl" id="c-loop" data-i18n-title="ctrl_loop">
              <svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span data-i18n="ctrl_loop">Loop</span></button>
            <button class="ctrl star" id="c-fav" data-i18n-title="ctrl_save">
              <svg viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .8-5 4.8 1.3 7L12 18l-6.3 3.1L7 14 2 9.3l7-.8z"/></svg><span data-i18n="ctrl_save">Save</span></button>
          </div>
        </div>
        <details class="behind" id="behind">
          <summary><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 0-2 2h-3"/></svg>
            <span><b data-i18n="behind_title">Behind the sign</b> — <span data-i18n="behind_sub">the HamNoSys / SiGML encoding</span></span></summary>
          <div class="meta" id="behind-meta"></div>
          <div class="tags" id="behind-tags"></div>
          <div class="note" data-i18n="behind_note">This is the machine-readable HamNoSys notation, serialised as SiGML — the same data the avatar renders.</div>
        </details>
      </div>
    </div>

    <div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="explore" data-i18n="tab_explore">Explore</button>
        <button class="tab" data-tab="dictionary" data-i18n="tab_dictionary">Dictionary</button>
        <button class="tab" data-tab="translate" data-i18n="tab_translate">Text → Sign</button>
        <button class="tab" data-tab="practice" data-i18n="tab_practice">Practice</button>
        <button class="tab" data-tab="saved" data-i18n="tab_saved">Saved</button>
      </div>
      <div class="panelbody" id="panel"></div>
    </div>
  </div>

  <div class="foot" data-i18n-html="foot">
    Signing powered by the <b>JASigning</b> avatar engine (existing).
  </div>
</div>
<script src="i18n.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
  </script>
</body>
</html>
